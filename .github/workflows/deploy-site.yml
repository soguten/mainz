name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build site
        run: deno run -A ./src/cli/mainz.ts build --target site --profile gh-pages

      - name: Resolve publish metadata
        id: publish
        shell: bash
        run: |
          metadata="$(deno run -A ./src/cli/mainz.ts publish-info --target site --profile gh-pages)"
          echo "$metadata"
          artifact_dir="$(METADATA="$metadata" deno eval 'console.log(JSON.parse(Deno.env.get("METADATA")!).artifactDir)')"
          echo "artifact_dir=$artifact_dir" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.publish.outputs.artifact_dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
