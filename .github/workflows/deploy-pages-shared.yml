name: Deploy Pages Shared

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build site
        run: deno run -A ./src/cli/mainz.ts build --target site --profile gh-pages

      - name: Build docs site
        run: deno run -A ./src/cli/mainz.ts build --target docs --profile gh-pages

      - name: Resolve publish metadata and assemble Pages artifact
        id: publish
        shell: bash
        run: |
          site_metadata="$(deno run -A ./src/cli/mainz.ts publish-info --target site --profile gh-pages)"
          docs_metadata="$(deno run -A ./src/cli/mainz.ts publish-info --target docs --profile gh-pages)"
          echo "$site_metadata"
          echo "$docs_metadata"

          site_artifact_dir="$(METADATA="$site_metadata" deno eval 'console.log(JSON.parse(Deno.env.get("METADATA")!).artifactDir)')"
          docs_artifact_dir="$(METADATA="$docs_metadata" deno eval 'console.log(JSON.parse(Deno.env.get("METADATA")!).artifactDir)')"
          staging_dir="_pages"

          rm -rf "$staging_dir"
          mkdir -p "$staging_dir/docs"
          cp -a "$site_artifact_dir"/. "$staging_dir"/
          cp -a "$docs_artifact_dir"/. "$staging_dir/docs"/

          echo "artifact_dir=$staging_dir" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.publish.outputs.artifact_dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
