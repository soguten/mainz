name: Publish JSR packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: "@mainz/mainz"
            config: "jsr.json"
          - name: "@mainz/cli-deno"
            config: "jsr.cli-deno.json"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Publish ${{ matrix.package.name }}
        run: deno publish --config ${{ matrix.package.config }}
