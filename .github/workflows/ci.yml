name: CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            core: ${{ steps.filter.outputs.core }}
            special: ${{ steps.filter.outputs.special }}
            smoke: ${{ steps.filter.outputs.smoke }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Detect affected suites
              id: filter
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      core:
                        - 'src/**'
                        - 'src/cli/**'
                        - 'src/routing/**'
                        - 'src/navigation/**'
                        - 'src/i18n/**'
                        - 'src/ssg/**'
                        - 'src/preview/**'
                        - 'tests/e2e/**'
                        - 'tests/checks/**'
                        - 'tests/helpers/**'
                        - 'tests/fixtures/**'
                        - 'vite.config.*'
                        - 'mainz.config.ts'
                      special:
                        - 'src/**'
                        - 'src/cli/**'
                        - 'src/config/**'
                        - 'src/routing/**'
                        - 'src/navigation/**'
                        - 'src/i18n/**'
                        - 'src/ssg/**'
                        - 'src/preview/**'
                        - 'tests/e2e/**'
                        - 'tests/checks/**'
                        - 'tests/helpers/**'
                        - 'tests/fixtures/**'
                        - 'site/mainz.build.ts'
                        - 'docs-site/mainz.build.ts'
                        - 'vite.config.*'
                        - 'mainz.config.ts'
                      smoke:
                        - 'src/**'
                        - 'src/cli/**'
                        - 'src/routing/**'
                        - 'src/navigation/**'
                        - 'src/i18n/**'
                        - 'src/ssg/**'
                        - 'src/preview/**'
                        - 'tests/e2e/**'
                        - 'tests/checks/**'
                        - 'tests/helpers/**'
                        - 'tests/fixtures/**'
                        - 'site/**'
                        - 'docs-site/**'
                        - 'vite.config.*'
                        - 'mainz.config.ts'

    fast:
        name: Fast tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Run fast tests
              run: deno task test:fast

    e2e-core:
        name: Core E2E
        needs: changes
        if: github.ref == 'refs/heads/main' || needs.changes.outputs.core == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Run core E2E
              run: deno task test:e2e:core

    e2e-special:
        name: Special E2E
        needs: changes
        if: github.ref == 'refs/heads/main' || needs.changes.outputs.special == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Run special E2E
              run: deno task test:e2e:special

    smoke:
        name: Smoke tests
        needs: changes
        if: github.ref == 'refs/heads/main' || needs.changes.outputs.smoke == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Run smoke tests
              run: deno task test:smoke

    full:
        name: Full suite
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        needs:
            - fast
            - e2e-core
            - e2e-special
            - smoke
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Run full suite
              run: deno task test
